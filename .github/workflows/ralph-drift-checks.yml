name: Ralph Drift Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ralph-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run Ralph Drift Guardrails
        shell: bash
        run: |
          set -euo pipefail
          scripts/check-ralph-drift.sh | tee ralph-drift-report.txt

      - name: Upload Drift Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ralph-drift-report
          path: ralph-drift-report.txt
